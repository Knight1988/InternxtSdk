name: .NET Core

on:
  push:
    branches:
      - develop
    tags:
      - '*'
  
  pull_request:
    branches:
      - develop

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 6.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --no-restore --verbosity normal

      - name: Publish and Push to NuGet
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo ::set-output name=tag::$(echo ${GITHUB_REF#refs/tags/})
          dotnet pack --no-restore --configuration Release /p:PackageVersion="${{ steps.vars.outputs.tag }}"
          dotnet nuget push "bin/Release/DarkKnight.InternxtSdk.${{ steps.vars.outputs.tag }}.nupkg" --api-key ${{secrets.NUGET_API_KEY}} --source https://nuget.org/