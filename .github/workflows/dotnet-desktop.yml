name: .NET Core

on:
  push:
    branches:
      - develop
    tags:
      - 'v*'
  
  pull_request:
    branches:
      - develop

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 6.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        env:
          TEST_USERNAME: ${{secrets.TEST_USERNAME}}
          TEST_PASSWORD: ${{secrets.TEST_PASSWORD}}
        run: dotnet test --no-restore --verbosity normal

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 6.0.x

      - name: Restore dependencies
        run: dotnet restore
        
      - name: Publish to NuGet
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "tag=$TAG" >> $GITHUB_ENV
          dotnet pack --no-restore --configuration Release /p:PackageVersion="${TAG}"
          dotnet nuget push "DarkKnight.InternxtSdk/bin/Release/DarkKnight.InternxtSdk.${TAG}.nupkg" --api-key ${{secrets.NUGET_API_KEY}} --source https://nuget.org/